apiVersion: v1
kind: Secret
metadata:
  name: nexuscore-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql://nexuscore_user:secure_password_replace_me@db-host:5432/nexuscore?schema=public&sslmode=prefer&pgbouncer=true&connection_limit=1"
  DIRECT_URL: "postgresql://nexuscore_user:secure_password_replace_me@db-host:5432/nexuscore?schema=public&sslmode=prefer"
  REDIS_URL: "redis://:secure_redis_password@redis-host:6379/0"
  JWT_SECRET: "NEXUSCORE_SUPER_SECURE_ENTERPRISE_JWT_KEY_MIN_32_BYTES"
  ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
  SENTRY_DSN: "https://secure-sentry-dsn@sentry.io/project"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexuscore-config
data:
  NODE_ENV: "production"
  PORT: "3000"
  ENABLE_RATE_LIMITING: "true"
  LOG_LEVEL: "info"
