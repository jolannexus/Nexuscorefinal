name: NexusCore Enterprise CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-and-test:
    name: Lint, Type Check & Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository codebase
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Schema Verification
        run: npx prisma validate --schema=prisma/schema.prisma || true

      - name: Execute ESLint Check
        run: npm run lint

      - name: Compile and Build Assets
        run: npm run build

  dockerize-and-release:
    name: Build & Publish Container Image
    needs: validate-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout repository codebase
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            nexuscore/app:latest
            nexuscore/app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  vps-cd-delivery:
    name: Automated Delivery on VPS Hosts
    needs: dockerize-and-release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy application stack via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /opt/nexuscore
            docker compose pull
            docker compose up -d --remove-orphans
            docker system prune -f
            echo "Successfully rolled out build version ${{ github.sha }} to production!"
